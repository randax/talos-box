name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false
      - run: make build
      - name: lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
      - run: make test
      # E2E tests require Virtualization.framework, which is unavailable on GitHub-hosted runners.
